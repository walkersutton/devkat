name: Secret scan

on:
  pull_request:
  push:
    # Keep `dev` enabled so branch pushes can trigger a manual CI smoke test.
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # gitleaks/gitleaks-action@v2 requires a paid license on org repos.
      # Run the OSS binary directly instead (same as local `brew install gitleaks`).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Detect secrets
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact
