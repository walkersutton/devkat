name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Inject CLI version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/DEVKAT_CLI_VERSION_PLACEHOLDER/${VERSION}/g" devkat-cli/Sources/devkat-push/main.swift
          rm devkat-cli/Sources/devkat-push/main.swift.bak

      - name: Build release binary
        working-directory: devkat-cli
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package binary
        run: |
          cd devkat-cli/.build/apple/Products/Release
          tar -czf /tmp/devkat-push-macos-universal.tar.gz devkat-push

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=$(git log -1 --pretty=%B)
          gh release create "$TAG" /tmp/devkat-push-macos-universal.tar.gz \
            --title "$TAG" \
            --notes "$NOTES"
